version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - gosec
    - gocritic
    - revive
    - errorlint
    - nilerr
    - goconst
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - exhaustive
    - noctx
  settings:
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104

    gocritic:
      enabled-checks:
        - appendAssign
        - boolExprSimplify
        - builtinShadow
        - commentFormatting
        - defaultCaseOrder
        - dupImport
        - emptyFallthrough
        - emptyStringTest
        - equalFold
        - hexLiteral
        - indexAlloc
        - initClause
        - methodExprCall
        - nilValReturn
        - rangeExprCopy
        - rangeValCopy
        - singleCaseSwitch
        - sloppyLen
        - stringXbytes
        - typeAssertChain
        - underef
        - unlabelStmt
        - unslice
        - yodaStyleExpr

    revive:
      rules:
        - name: exported
          severity: warning
        - name: package-comments
          severity: warning
        - name: context-as-argument
          severity: warning
        - name: error-return
          severity: warning
        - name: error-strings
          severity: warning
        - name: error-naming
          severity: warning
        - name: indent-error-flow
          severity: warning
        - name: if-return
          severity: warning
        - name: var-naming
          severity: warning
        - name: var-declaration
          severity: warning
        - name: unexported-return
          severity: warning

    errorlint:
      errorf: true
      asserts: true
      comparison: true

  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gocritic
        text: "commentFormatting"
      - path: docs/
        linters:
          - revive
